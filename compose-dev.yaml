services:
  postgres:
    image: postgres:18
    container_name: domus-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
    command: ["postgres", "-c", "port=${POSTGRES_PORT:-5432}"]
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - domus-pgdata:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -p "$${POSTGRES_PORT:-5432}"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  app:
    build: .
    container_name: domus-app
    restart: unless-stopped
    env_file: ".env"
    environment:
      POSTGRES_HOST: postgres
      DOMUS_PORT: "${DOMUS_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DOMUS_PORT:-3000}:${DOMUS_PORT:-3000}"
volumes:
  domus-pgdata:
